apiVersion: v1
kind: Service
metadata:
  name: mock-libvirtd
  namespace: mock-services
  annotations:
    kubernetes.io/description: "Mock libvirtd service for E2E testing of libvirt-based applications"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      name: http
      targetPort: 8080
  selector:
    app: mock-libvirtd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-libvirtd
  namespace: mock-services
  annotations:
    kubernetes.io/description: "Mock libvirtd service for E2E testing of libvirt-based applications"
  labels:
    managed-by: mock-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-libvirtd
  template:
    metadata:
      annotations:
        kubernetes.io/description: "Mock libvirtd service for E2E testing of libvirt-based applications"
      labels:
        app: mock-libvirtd
    spec:
      containers:
      - name: mock-libvirtd
        image: mock-libvirtd:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: GIN_MODE
          value: "release"
        - name: HTTP_PORT
          value: "8080"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 3
          timeoutSeconds: 2
          failureThreshold: 2
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "100m"
